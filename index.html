<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health Calculator Suite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Basic Health Calculator Suite</h1>

    <!-- BMI Calculator -->
    <section class="card">
      <h2>BMI Calculator</h2>
      <label>Weight (kg): <input type="number" id="bmi-weight"></label>
      <label>Height (cm): <input type="number" id="bmi-height"></label>
      <button onclick="calculateBMI()">Calculate BMI</button>
      <p id="bmi-result"></p>
<p class="recommendation" id="bmi-reco"></p>

    </section>

    <!-- BMR Calculator -->
    <section class="card">
      <h2>BMR Calculator</h2>
      <label>Weight (kg): <input type="number" id="bmr-weight"></label>
      <label>Height (cm): <input type="number" id="bmr-height"></label>
      <label>Age: <input type="number" id="bmr-age"></label>
      <label>
        Gender:
        <select id="bmr-gender">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </label>
      <button onclick="calculateBMR()">Calculate BMR</button>
      <p id="bmr-result"></p>
<p class="recommendation" id="bmr-reco"></p>

    </section>

    <!-- Water Intake -->
    <section class="card">
      <h2>Water Intake Recommendation</h2>
      <label>Weight (kg): <input type="number" id="water-weight"></label>
      <button onclick="calculateWater()">Calculate</button>
      <p id="water-result"></p>
<p class="recommendation" id="water-reco"></p>

    </section>


<section class="card">
  <h2>Daily Calorie Needs</h2>
  <label>Enter BMR (from above): <input type="number" id="calorie-bmr"></label>
  <label>
    Activity Level:
    <select id="activity-level">
      <option value="1.2">Sedentary (little/no exercise)</option>
      <option value="1.375">Light (1-3 days/week)</option>
      <option value="1.55">Moderate (3-5 days/week)</option>
      <option value="1.725">Very Active (6-7 days/week)</option>
      <option value="1.9">Extra Active (physical job)</option>
    </select>
  </label>
  <button onclick="calculateCalories()">Calculate</button>
  <p id="calorie-result"></p>
<p class="recommendation" id="calorie-reco"></p>
</section>


<section class="card">
  <h2>Dosage Estimator</h2>
  <label>Weight (kg): <input type="number" id="dose-weight"></label>
  <label>Dosage (mg per kg): <input type="number" id="dose-mgkg"></label>
  <label>Frequency per day (e.g. 1, 2, 3): <input type="number" id="dose-frequency" value="1"></label>
  <button onclick="calculateDosage()">Calculate Dose</button>
 <p id="dose-result"></p>
<p class="recommendation" id="dose-reco"></p>
</section>
<section class="card">
  <h2>Export Results</h2>
  <button onclick="copyToClipboard()">📋 Copy Results</button>
  <button onclick="exportToPDF()">📄 Download PDF</button>
  <p id="export-status"></p>
</section>
  </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="script.js"></script>
</body>
</html>
